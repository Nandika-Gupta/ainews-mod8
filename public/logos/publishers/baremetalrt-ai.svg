    <clipPath id="clip"><path d="M9,1 H206 L255,50 V247 A8,8 0 0 1 247,255 H9 A8,8 0 0 1 1,247 V9 A8,8 0 0 1 9,1 Z"/></clipPath>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <path d="M9,1 H206 L255,50 V247 A8,8 0 0 1 247,255 H9 A8,8 0 0 1 1,247 V9 A8,8 0 0 1 9,1 Z" fill="url(#tile)"/>
  <g clip-path="url(#clip)" filter="url(#sh)">
  <polygon points="40,181 164,181 164,192 40,192" fill="#4f46e5"/>
  <polygon points="92,165 216,165 164,181 40,181" fill="#6a73f3"/>
