  <path d="M9,1 H206 L255,50 V247 A8,8 0 0 1 247,255 H9 A8,8 0 0 1 1,247 V9 A8,8 0 0 1 9,1 Z" fill="none" stroke="#32323e" stroke-width="2"/>
