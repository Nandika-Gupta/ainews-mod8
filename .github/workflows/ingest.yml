name: Ingest AI news

on:
  schedule:
    # Every 8 hours (3x/day: 00:00, 08:00, 16:00 UTC) — lower frequency to
    # keep GitHub Actions minutes usage comfortable if this repo is ever
    # moved to a private repo on a lower-tier plan. GitHub's scheduler is
    # best-effort and can lag during high load — treat this as "roughly every
    # 8 hours," not a guarantee.
    - cron: "0 */8 * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Job-level safety net so a genuinely hung run fails and alerts within a
    # bounded window instead of silently running for hours. Sized above the
    # expected post-concurrency-fix duration (see the per-step timeout below
    # and pipeline.ts's SUMMARY_CONCURRENCY) with headroom for the
    # resolve-logos/commit steps that run after ingestion.
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Run ingestion
        timeout-minutes: 15
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run ingest

      - name: Resolve any missing publisher logos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run resolve-logos

      - name: Commit newly downloaded logos, if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/logos/publishers
          git diff --cached --quiet || git commit -m "chore: cache newly resolved publisher logos [skip ci]"
          git push
